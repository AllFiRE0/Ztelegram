# Замены Minecraft → Telegram
minecraft-to-telegram:
  regex:
    # Убираем остатки цветовых кодов CMI
    "\\{[^}]*\\}": ""
    # Убираем §x блоки полностью
    "§x(§[0-9a-fA-F]){6}": ""
    # Убираем одиночные §коды
    "§[0-9a-fk-orA-FK-OR]": ""
    "&[0-9a-fk-orA-FK-OR]": ""
  text:
    "☺": ":)"
    "☹": ":("
    # добавь свои

# Замены Telegram → Minecraft
telegram-to-minecraft:
  regex:
    # Убираем Markdown если мешает
  text:
    ":)": "☺"
    ":(": "☹"
